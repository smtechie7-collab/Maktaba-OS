<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <style>
        @page {
            size: A5;
            margin: 0;
        }
        body {
            background-color: #fdf6e3;
            height: 210mm;
            width: 148mm;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            border: 15mm solid #2c3e50;
            box-sizing: border-box;
            font-family: 'Amiri', serif;
            color: #2c3e50;
        }
        .ornament {
            font-size: 50pt;
            margin-bottom: 20pt;
        }
        h1 {
            font-size: 42pt;
            margin: 0;
            text-align: center;
        }
        .line {
            width: 50mm;
            height: 2pt;
            background-color: #2c3e50;
            margin: 20pt 0;
        }
        h2 {
            font-size: 20pt;
            margin: 0;
        }
        .footer {
            position: absolute;
            bottom: 30mm;
            font-size: 14pt;
        }
    </style>
</head>
<body>
    <div class="ornament">﷽</div>
    <h1>{{ book_title }}</h1>
    <div class="line"></div>
    <h2>{{ author }}</h2>
    <div class="footer">Maktaba-OS Digital Edition</div>
</body>
</html>
